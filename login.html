<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/login.css">
</head>
<body>
    <div class="container" style="text-align:center; padding-top:100px;">
        <h1>Kantina Logginn</h1>
        <button id="login-btn" style="padding:15px 30px; font-size:1.2em;">Logg inn med Google</button>
    </div>

    <script type="module">
        import { auth, provider, db } from './scripts/firebase-config.js';
        import { signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        document.getElementById('login-btn').onclick = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);

                if (!userSnap.exists()) {
                    await setDoc(userRef, {
                        navn: user.displayName,
                        epost: user.email,
                        rolle: "elev",
                        opprettet: serverTimestamp()
                    });
                }
                
                window.location.href = 'index.html';
            } catch (err) {
                alert("Feil ved innlogging: " + err.message);
            }
        };
    </script>
</body>
</html>
