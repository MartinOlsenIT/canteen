<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Kantina</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/admin.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>⚙️ Admin Panel</h1>
            <button class="btn-primary" onclick="window.location.href='index.html'">Til Meny</button>
        </header>

        <div class="admin-form">
            <h3>➕ Legg til ny vare</h3>
            <input type="text" id="name" placeholder="Navn på matvare">
            <input type="number" id="price" placeholder="Pris i kr">
            <input type="number" id="stock" placeholder="Antall på lager">
            <button class="btn-primary" id="add-btn" style="width:100%;">Lagre Produkt</button>
        </div>

        <div class="admin-form">
            <h3>🍴 Administrer Meny</h3>
            <div id="admin-menu-list">Laster meny...</div>
        </div>

        <h2>📦 Aktive Bestillinger</h2>
        <div id="orders-list">Laster bestillinger...</div>
    </div>

    <script type="module">
        import { db, auth } from './scripts/firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { collection, addDoc, onSnapshot, query, orderBy, doc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'index.html'; // Send til forsiden for logginn
                return;
            }
            const userSnap = await getDoc(doc(db, "users", user.uid));
            if (!userSnap.exists() || userSnap.data().rolle !== 'admin') {
                window.location.href = 'index.html';
            }
        });

        // (Samme funksjoner for addDoc, deleteProduct og deleteOrder som i forrige melding)
        document.getElementById('add-btn').onclick = async () => {
            const name = document.getElementById('name').value;
            const price = Number(document.getElementById('price').value);
            const stock = Number(document.getElementById('stock').value);
            if (name && price) {
                await addDoc(collection(db, "products"), { name, price, stock });
                alert("Vare lagt til!");
                document.getElementById('name').value = '';
                document.getElementById('price').value = '';
                document.getElementById('stock').value = '';
            }
        };

        onSnapshot(collection(db, "products"), (snap) => {
            const menuDiv = document.getElementById('admin-menu-list');
            menuDiv.innerHTML = '';
            snap.forEach(d => {
                const item = d.data();
                menuDiv.innerHTML += `
                    <div class="order-card" style="border-left-color: #34495e;">
                        <div><strong>${item.name}</strong> - ${item.price} kr (Lager: ${item.stock})</div>
                        <button class="btn-danger" onclick="deleteProduct('${d.id}')">Slett</button>
                    </div>`;
            });
        });

        onSnapshot(query(collection(db, "orders"), orderBy("timestamp", "desc")), (snap) => {
            const list = document.getElementById('orders-list');
            list.innerHTML = '';
            snap.forEach(d => {
                const o = d.data();
                list.innerHTML += `
                    <div class="order-card">
                        <div><strong>${o.userName}</strong><br><small>${o.items.map(i => i.name).join(", ")}</small></div>
                        <button class="btn-primary" onclick="deleteOrder('${d.id}')">Ferdig</button>
                    </div>`;
            });
        });

        window.deleteProduct = async (id) => { if(confirm("Slett vare?")) await deleteDoc(doc(db, "products", id)); };
        window.deleteOrder = async (id) => { await deleteDoc(doc(db, "orders", id)); };
    </script>
</body>
</html>
