<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/admin.css">
</head>
<body>
    <div class="container">
        <div style="display:flex; justify-content:space-between;">
            <h1>Admin Panel</h1>
            <button onclick="window.location.href='index.html'">Tilbake til meny</button>
        </div>

        <div style="background:#eee; padding:20px; border-radius:10px; margin-bottom:20px;">
            <h3>Legg til ny mat</h3>
            <input type="text" id="name" placeholder="Navn på mat">
            <input type="number" id="price" placeholder="Pris">
            <input type="number" id="stock" placeholder="Lagerbeholdning">
            <button id="add-btn" style="background:green; color:white; margin-top:10px; width:100%;">Lagre vare</button>
        </div>

        <h3>Aktive bestillinger</h3>
        <div id="orders-list"></div>
    </div>

    <script type="module">
        import { db, auth } from './scripts/firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { collection, addDoc, onSnapshot, query, orderBy, doc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Sikkerhetssjekk
        onAuthStateChanged(auth, async (user) => {
            if (!user) return window.location.href = 'login.html';
            const userSnap = await getDoc(doc(db, "users", user.uid));
            if (!userSnap.exists() || userSnap.data().rolle !== 'admin') {
                alert("Ingen adgang!");
                window.location.href = 'index.html';
            }
        });

        // Legg til mat
        document.getElementById('add-btn').onclick = async () => {
            const name = document.getElementById('name').value;
            const price = Number(document.getElementById('price').value);
            const stock = Number(document.getElementById('stock').value);
            
            if (name && price) {
                await addDoc(collection(db, "products"), { name, price, stock });
                alert("Varen er lagt til!");
                document.getElementById('name').value = '';
            }
        };

        // Vis ordre
        const q = query(collection(db, "orders"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('orders-list');
            list.innerHTML = '';
            snap.forEach(d => {
                const o = d.data();
                const div = document.createElement('div');
                div.style = "border:1px solid #ccc; padding:10px; margin-bottom:10px; background:white;";
                div.innerHTML = `
                    <strong>${o.userName}</strong> har bestilt: ${o.items.map(i => i.name).join(", ")}
                    <button onclick="deleteOrder('${d.id}')" style="background:red; float:right;">Ferdig</button>
                `;
                list.appendChild(div);
            });
        });

        window.deleteOrder = async (id) => {
            await deleteDoc(doc(db, "orders", id));
        };
    </script>
</body>
</html>
