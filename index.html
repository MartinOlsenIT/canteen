<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kantina - Velkommen</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/index.css">
</head>
<body>

    <div id="login-screen" style="display: none;">
        <div class="container" style="text-align: center; padding-top: 100px;">
            <div class="card" style="padding: 50px; max-width: 400px; margin: auto;">
                <h1>🥗 Kantina</h1>
                <p>Logg inn med skolekontoen din for å se menyen og bestille mat.</p>
                <br>
                <button class="btn-primary" id="login-btn-google" style="font-size: 1.2em; width: 100%;">
                    Logg inn med Google
                </button>
            </div>
        </div>
    </div>

    <div id="main-content" style="display: none;">
        <div class="container">
            <header>
                <div id="logo">
                    <h1>🥗 Kantina</h1>
                </div>
                <div id="user-info">
                    </div>
            </header>

            <div class="menu-grid" id="menu-list">
                </div>

            <div class="cart-container">
                <h3>🛒 Din Handlekorg</h3>
                <div id="cart-items">
                    <p>Korgen er tom...</p>
                </div>
                <hr>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h4>Total: <span id="total-price">0</span> kr</h4>
                    <button class="btn-primary" id="checkout-btn">Fullfør Bestilling</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="scripts/app.js"></script>
</body>
</html>
